spring.application.name=qa-sentinel
server.port=9096

logging.level.org.vcl.qasentinel=INFO

# Virtual threads require JDK 21+ in Spring Boot; enable when running on Java 21.
spring.threads.virtual.enabled=false
spring.jackson.deserialization.fail-on-unknown-properties=true


jira.enabled=true
# Site root only (https://YOUR.atlassian.net). Do not use a board/backlog URL — REST calls need /rest/api/3/...
jira.base-url=${JIRA_BASE_URL:}
jira.email=${JIRA_EMAIL:}
jira.api-token=${JIRA_API_TOKEN:}
jira.max-results=25
jira.connect-timeout=10s
jira.read-timeout=30s
# Automated bug shape (must match your Jira project + link types)
jira.bug-issue-type-name=Bug
jira.bug-link-type-name=Relates
# Nest the bug under the user story in Jira (parent field). Many company-managed templates reject Bug→Story parent (HTTP 400 parentId/hierarchy); default false uses link-only. The server retries without parent if Jira rejects hierarchy when this is true.
jira.bug-parent-story-enabled=false
# Comma-separated custom field id(s) for Acceptance Criteria, e.g. customfield_10046 (inspect issue JSON in Jira)
jira.acceptance-criteria-field-ids=
# Optional: assign every QA-filed bug (set accountId to skip name lookup). Display name uses /rest/api/3/user/search.
jira.default-bug-assignee-display-name=
jira.default-bug-assignee-account-id=

# Groq OpenAI-compatible API (required for QA step planning — zero-scripting; leave blank only if you do not run /api/qa/run)
groq.api-key=${GROQ_API_TOKEN:}
groq.model=llama-3.3-70b-versatile
groq.base-url=https://api.groq.com/openai/v1

# Playwright runner (relative to JVM cwd — use ../qa-runner when bootRun from backend/)
qa.playwright.working-dir=../qa-runner
qa.playwright.test-args=tests/dynamic-test.spec.js
qa.playwright.timeout-seconds=300
# env = QA_STEPS_JSON | file = QA_STEPS_FILE (under qa-runner/test-results/dynamic-steps.json)
qa.playwright.steps-delivery=env
# Runner POSTs JSON to {reportBaseUrl}/qa-report (ingest-only; no Jira). Blank = omit QA_REPORT_URL.
qa.playwright.report-base-url=http://localhost:9096

# Default URL under test: bundled SPA + API on this server after `npm run build` in ../frontend then bootRun.
# For hot-reload UI instead: http://localhost:5173/loan (run Vite in ../frontend).
qa.flow.default-env-base-url=http://localhost:9096/loan
# Guaranteed live demo: DEMO_LOCKED_MODE=true OR qa.flow.demo-locked-mode=true — fixed issue key, cached Groq-shaped steps, single Playwright run
qa.flow.demo-locked-mode=false
qa.flow.demo-locked-issue-key=
qa.flow.demo-locked-plan-resource=demo-locked/demo-plan.json
# Batch: POST /api/v1/qa/flow/project/{projectKey}/stories/run — all stories matching JQL (FE+BE steps via Groq)
qa.flow.batch-story-issue-type-name=Story
qa.flow.batch-max-stories=20
# e.g. AND statusCategory != Done
qa.flow.batch-jql-suffix=

# AI agent (POST /api/ai/ask): Jira projects for issue context; run history is in-memory per JVM
qa.agent.context-projects=SCRUM
qa.agent.history-limit=25
qa.agent.max-context-chars=8000

# qa.flow.batch-concurrency=1
# qa.flow.batch-delay-ms-between-stories=0
# qa.flow.batch-dry-run=false
# qa.flow.allow-private-env-urls=true

# Optional: require X-QA-Sentinel-Api-Key on /api/** (health endpoints exempt)
# qa.sentinel.api-key=

# Local persistence: JSONL run history + JSON idempotency map under user home (survives JVM restarts)
qa.sentinel.persistence-enabled=true
qa.sentinel.bug-idempotency-enabled=true
# qa.sentinel.run-history-file=
# qa.sentinel.bug-idempotency-file=

app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173

# Local overrides (optional file next to this one). Env vars JIRA_*, GROQ_API_TOKEN still win over file values.
spring.config.import=optional:classpath:application-local.properties
