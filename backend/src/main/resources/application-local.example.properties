# Copy to application-local.properties for file-based overrides (gitignored).
# Prefer environment variables in deployment: JIRA_BASE_URL, JIRA_EMAIL, JIRA_API_TOKEN, GROQ_API_TOKEN.

jira.base-url=https://your-domain.atlassian.net
jira.email=your-atlassian-account-email@example.com
jira.api-token=

# Optional: nest bugs under the story (parent). Set false if Jira rejects parent for Bug type.
# jira.bug-parent-story-enabled=true

groq.api-key=

# Batch / rate limits (see RUNBOOK.md)
# qa.flow.batch-max-stories=20
# qa.flow.batch-concurrency=1
# qa.flow.batch-delay-ms-between-stories=0
# qa.flow.batch-dry-run=false
# qa.flow.allow-private-env-urls=true

# Local run history + bug idempotency (~/.qa-sentinel by default)
# qa.sentinel.persistence-enabled=true
# qa.sentinel.bug-idempotency-enabled=true

# Production-style API protection (optional)
# qa.sentinel.api-key=
