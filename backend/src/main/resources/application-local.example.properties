# Copy to application-local.properties and fill in secrets.
# Jira REST API uses the site root only (same host as your board), not the full board URL.
# Board UI example: https://sripreethipreethi96.atlassian.net/jira/software/projects/SCRUM/summary
jira.base-url=https://sripreethipreethi96.atlassian.net
jira.email=your-atlassian-account-email@example.com
jira.api-token=

# Optional: comma-separated Jira custom field id(s) for Acceptance Criteria (see issue JSON in browser devtools or REST).
# jira.acceptance-criteria-field-ids=customfield_10046

# Optional: every QA-filed bug assignee (Jira Cloud). Prefer accountId from profile URL if search is ambiguous.
# jira.default-bug-assignee-display-name=Sripreethi Suresh
# jira.default-bug-assignee-account-id=

# Optional batch QA (POST .../flow/project/{KEY}/stories/run): issue type filter + max + JQL suffix
# qa.flow.batch-story-issue-type-name=Story
# qa.flow.batch-max-stories=20
# qa.flow.batch-jql-suffix=AND statusCategory != Done

groq.api-key=
